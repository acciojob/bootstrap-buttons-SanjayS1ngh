<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Bootstrap Buttons</title>
</head>
<body>

<div class="container mt-4">

    <!-- Button 1: Primary -->
    <button id="button-1" class="btn btn-primary">
        Primary button
    </button>

    <!-- Button 2: Outline Secondary -->
    <button id="button-2" class="btn btn-outline-secondary">
        Outline secondary button
    </button>

    <!-- Button 3: Success Large -->
    <button id="button-3" class="btn btn-success btn-lg">
        Success large button
    </button>

    <!-- Button 4: Danger Small -->
    <button id="button-4" class="btn btn-danger btn-sm">
        Danger small button
    </button>

    <!-- Button 5: Warning Large Full Width -->
    <button id="button-5" class="btn btn-warning btn-lg vw-100">
        Warning large full-screen width button
    </button>

    <!-- Button 6: Disabled Info -->
    <button id="button-6" class="btn btn-info-disabled" disabled>
        Disabled info button
    </button>

    <!-- Button 7: Light -->
    <button id="button-7" class="btn btn-light">
        Light button
    </button>

    <!-- Button 8: Link -->
    <button id="button-8" class="btn btn-link">
        Link button
    </button>

</div>

</body>
</html>
